name: Android APK

# Manual trigger + on tag push (vX.Y.Z) — uploads APK to the corresponding release
on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to attach APK to (e.g. v0.2.0-rc1)'
        required: false
        default: ''
  push:
    tags:
      - 'v*'

jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # to upload to releases

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Set up Node 20 + pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install monorepo deps
        run: pnpm install --no-frozen-lockfile

      - name: Build shared packages first (dep order matters)
        run: pnpm --filter "./packages/**" build

      - name: Build shared web bundle (Windows renderer used as Android UI)
        run: pnpm --filter @slave-vpn/windows build

      - name: Capacitor add android (first time)
        working-directory: apps/android
        run: |
          if [ ! -d "android" ]; then
            pnpm exec cap add android
          fi

      - name: Enable Kotlin in the generated Android project
        working-directory: apps/android/android
        run: |
          set -e
          # The Capacitor template applies ONLY 'com.android.application' — no
          # Kotlin plugin. Without this our *.kt plugin files (SlaveVpnPlugin,
          # SlaveVpnService, SingboxBridge) are silently skipped by the Java
          # compiler, the SlaveVpn plugin class never lands in the APK, and the
          # JS side throws `"SlaveVpn" plugin is not implemented on android`.
          if ! grep -q 'kotlin-gradle-plugin' build.gradle; then
            sed -i "/com.android.tools.build:gradle:/a\\        classpath 'org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.25'" build.gradle
          fi
          if ! grep -q "kotlin-android" app/build.gradle; then
            sed -i "/apply plugin: 'com.android.application'/a apply plugin: 'kotlin-android'" app/build.gradle
          fi
          # Kotlin JVM target must match Capacitor's Java 21 compileOptions or
          # Gradle fails with "Inconsistent JVM-target compatibility".
          if ! grep -q "jvmTarget" app/build.gradle; then
            sed -i 's|android {|android {\n    kotlinOptions { jvmTarget = "21" }|' app/build.gradle
          fi
          echo "=== root build.gradle classpaths ==="; grep -n "classpath" build.gradle
          echo "=== app build.gradle head ==="; head -6 app/build.gradle

      - name: Copy sample Kotlin plugin
        working-directory: apps/android
        run: |
          mkdir -p android/app/src/main/java/com/slavevpn/plugin
          cp sample-native/SlaveVpnPlugin/*.kt android/app/src/main/java/com/slavevpn/plugin/

      - name: Register SlaveVpnPlugin in MainActivity
        working-directory: apps/android
        run: |
          set -e
          # IMPORTANT: appId is com.slavevpn.app, so Capacitor generates the
          # launcher activity at com/slavevpn/app/MainActivity.java. We must
          # register the plugin in THAT activity (the one the manifest launches)
          # — registering in com.slavevpn.MainActivity did nothing because that
          # activity was never started.
          PKG_DIR=android/app/src/main/java/com/slavevpn/app
          mkdir -p "$PKG_DIR"
          # Drop the auto-generated Java launcher so it can't shadow our Kotlin
          # one (duplicate class) and so the plugin actually gets registered.
          rm -f "$PKG_DIR/MainActivity.java"
          # Clean up the stale wrong-package activity from earlier CI versions.
          rm -f android/app/src/main/java/com/slavevpn/MainActivity.kt
          MAIN="$PKG_DIR/MainActivity.kt"
          cat > "$MAIN" <<'EOF'
          package com.slavevpn.app

          import android.os.Bundle
          import com.getcapacitor.BridgeActivity
          import com.slavevpn.plugin.SlaveVpnPlugin

          class MainActivity : BridgeActivity() {
              override fun onCreate(savedInstanceState: Bundle?) {
                  registerPlugin(SlaveVpnPlugin::class.java)
                  super.onCreate(savedInstanceState)
              }
          }
          EOF
          echo "MainActivity.kt wired with SlaveVpnPlugin registration:"
          cat "$MAIN"
          echo "=== launcher package in manifest ==="
          grep -n 'package=' android/app/src/main/AndroidManifest.xml || true

      - name: Copy core .aar (clashbox = mihomo/Clash.Meta engine, VLESS-enc capable)
        working-directory: apps/android
        run: |
          mkdir -p android/app/libs
          shopt -s nullglob
          aars=(libs/*.aar)
          if [ ${#aars[@]} -gt 0 ]; then
            cp libs/*.aar android/app/libs/
            for f in "${aars[@]}"; do echo "copied $(basename "$f") ($(du -h "$f" | cut -f1))"; done
          else
            echo "WARNING: apps/android/libs/*.aar missing — APK will lack the VPN engine"
          fi

      - name: Bundle geo databases (geoip/geosite) into the APK
        working-directory: apps/android
        run: |
          # Ship the geo .dat in assets so the native core loads them locally and
          # does NOT download ~23 MB via geox-url on the first connect (that cold
          # download was the occasional first-connect timeout). Non-fatal: if the
          # download fails the core still falls back to geox-url at runtime.
          mkdir -p android/app/src/main/assets/geo
          base="https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest"
          curl -fsSL -o android/app/src/main/assets/geo/geoip.dat   "$base/geoip.dat"   || echo "WARN: geoip.dat download failed"
          curl -fsSL -o android/app/src/main/assets/geo/geosite.dat "$base/geosite.dat" || echo "WARN: geosite.dat download failed"
          ls -la android/app/src/main/assets/geo/ || true

      - name: Patch AndroidManifest with VPN permissions + service
        working-directory: apps/android/android/app/src/main
        run: |
          set -e
          if ! grep -q 'BIND_VPN_SERVICE' AndroidManifest.xml; then
            # Insert permissions before <application>
            sed -i 's|<application|<uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />\n    <uses-permission android:name="android.permission.FOREGROUND_SERVICE_SPECIAL_USE" />\n    <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />\n    <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED" />\n    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />\n    <uses-permission android:name="android.permission.QUERY_ALL_PACKAGES" />\n\n    <application|' AndroidManifest.xml

            # Insert service before </application>
            sed -i 's|</application>|        <service\n            android:name="com.slavevpn.plugin.SlaveVpnService"\n            android:permission="android.permission.BIND_VPN_SERVICE"\n            android:foregroundServiceType="specialUse"\n            android:exported="false">\n            <intent-filter>\n                <action android:name="android.net.VpnService" />\n            </intent-filter>\n            <property\n                android:name="android.app.PROPERTY_SPECIAL_USE_FGS_SUBTYPE"\n                android:value="VPN tunnel for SLAVE VPN" />\n        </service>\n    </application>|' AndroidManifest.xml
          fi

      - name: Add Kotlin coroutines + androidx-core + libbox dependencies
        working-directory: apps/android/android/app
        run: |
          if ! grep -q 'kotlinx-coroutines-android' build.gradle; then
            sed -i "s|dependencies {|dependencies {\n    implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.8.0'\n    implementation 'androidx.core:core-ktx:1.13.0'\n    implementation fileTree(dir: 'libs', include: ['*.aar'])|" build.gradle
          fi
          # libbox needs minSdk 21 (already default in Capacitor projects)
          # Disable strict packaging — libbox.aar may have duplicate META-INF entries
          if ! grep -q 'jniLibs.useLegacyPackaging' build.gradle; then
            sed -i 's|android {|android {\n    packagingOptions {\n        jniLibs {\n            useLegacyPackaging = false\n            pickFirsts += ["**/libc++_shared.so"]\n        }\n        resources {\n            excludes += ["META-INF/LICENSE", "META-INF/LICENSE.txt", "META-INF/NOTICE", "META-INF/NOTICE.txt"]\n        }\n    }|' build.gradle
          fi

      - name: Capacitor sync
        working-directory: apps/android
        run: |
          pnpm exec cap copy android
          pnpm exec cap sync android

      - name: Build debug APK
        working-directory: apps/android/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: |
          mkdir -p artifacts
          cp apps/android/android/app/build/outputs/apk/debug/app-debug.apk \
             artifacts/SlaveAppsVPN-Android-debug.apk

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: SlaveAppsVPN-Android-debug
          path: artifacts/SlaveAppsVPN-Android-debug.apk
          if-no-files-found: error

      - name: Attach APK to release (when triggered by tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/SlaveAppsVPN-Android-debug.apk

      - name: Attach APK to existing release (manual trigger with tag)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.inputs.release_tag }}" \
            artifacts/SlaveAppsVPN-Android-debug.apk \
            --clobber
