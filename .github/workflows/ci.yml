name: CI

on:
  push:
    branches: [main, develop, 'release/*', 'hotfix/*']
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
        env:
          NODE_OPTIONS: --max-old-space-size=4096

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build all packages
        run: pnpm --filter=!@slave-vpn/windows build
        env:
          NODE_OPTIONS: --max-old-space-size=4096

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Audit dependencies (production only)
        # devDependencies (electron-builder build chain etc.) ship a long
        # tail of path-traversal/prototype-pollution issues that don't
        # affect runtime. Audit only the prod dep graph here, and only
        # fail on critical — high-severity findings are surfaced as
        # warnings (current Electron 33.x has several open advisories
        # tracked for a separate upgrade task).
        run: pnpm audit --prod --audit-level=critical
        continue-on-error: false

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint

  boundaries:
    name: Architecture Boundaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Validate architecture boundaries
        run: node scripts/validate-boundaries.mjs

  build-windows-smoke:
    name: Windows build smoke test
    runs-on: windows-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build shared packages (dep order matters)
        run: pnpm --filter "./packages/**" build
      - name: Build Electron app (electron-vite, no installer)
        run: pnpm --filter @slave-vpn/windows build
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          GIT_COMMIT_HASH: ${{ github.sha }}
      - name: Verify build outputs
        shell: bash
        run: |
          test -f apps/windows/out/main/index.js      || (echo "FAIL: main missing" && exit 1)
          test -f apps/windows/out/preload/index.js   || (echo "FAIL: preload missing" && exit 1)
          test -f apps/windows/out/renderer/index.html || (echo "FAIL: renderer missing" && exit 1)
          echo "All build outputs present"
