<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <title>SLAVE VPN</title>
    <!-- Fonts use system fallback stack (Inter → Segoe UI → sans-serif) — CSP blocks external font hosts -->
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Very-early error handler — surfaces any error from the main bundle
      // (parse, import, top-level throw) directly to the DOM so users on
      // platforms without devtools (e.g. Android WebView) still see what
      // went wrong instead of a white screen.
      (function () {
        function showError(label, payload) {
          try {
            var root = document.getElementById('root') || document.body
            var box = document.createElement('div')
            box.style.cssText = 'font:12px/1.4 system-ui,sans-serif;color:#fff;background:#1a1a1a;padding:12px;margin:8px;border:1px solid #ff4444;border-radius:6px;white-space:pre-wrap;word-break:break-word'
            box.textContent = '[' + label + '] ' + payload
            root.appendChild(box)
          } catch (e) { /* swallow */ }
        }
        window.addEventListener('error', function (e) {
          showError('ERROR', (e.error && (e.error.stack || e.error.message)) || e.message || String(e))
        })
        window.addEventListener('unhandledrejection', function (e) {
          var r = e.reason
          showError('UNHANDLED REJECTION', (r && (r.stack || r.message)) || String(r))
        })
      })()
    </script>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
