appId: com.slavevpn.app
productName: SLAVE VPN
copyright: Copyright © 2025 SLAVE VPN

directories:
  output: release/${version}

files:
  - out/**/*
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.*'
  - '!{.eslintignore,.eslintrc.*,.prettierignore,.prettierrc*}'
  - '!{.env,.env.*,.npmrc}'
  - '!{README.md,CHANGELOG.md}'

extraResources:
  - from: resources/icons
    to: icons
  - from: resources/bin
    to: bin
    filter:
      - '**/*.exe'
      - '**/*.dll'
  - from: resources/rules
    to: rules
    filter:
      - '**/*.dat'  # mihomo geo databases
      - '**/*.db'   # sing-box geo databases
      - '**/*.yaml'
      - '**/*.yml'

win:
  executableName: slave-vpn
  requestedExecutionLevel: requireAdministrator
  icon: resources/icons/icon.ico
  # Code signing: enabled when CSC_LINK or WIN_CSC_LINK env var is set.
  # See docs/CODESIGNING.md for setup.
  signtoolOptions:
    signingHashAlgorithms:
      - sha256
    # Optional explicit certificate file (.pfx); if unset, electron-builder
    # uses CSC_LINK env var (URL or base64 of the .pfx).
    # certificateFile: ../../codesign/slavevpn.pfx
  # Authenticode timestamp server — required so signatures don't expire
  # when the certificate does. Sectigo is reliable; DigiCert as fallback.
  # electron-builder defaults to http://timestamp.digicert.com which is fine.
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64

nsis:
  artifactName: SlaveAppsVPN-Setup-v${version}.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
  oneClick: false
  allowElevation: true
  allowToChangeInstallationDirectory: false
  perMachine: false
  runAfterFinish: true
  installerHeaderIcon: resources/icons/icon.ico
  # TODO: add custom nsh scripts for WinTUN driver installation

portable:
  artifactName: SlaveAppsVPN-Portable-v${version}.${ext}
  # The app exe manifest is requireAdministrator (WinTUN needs it). But
  # electron-builder does NOT propagate win.requestedExecutionLevel to the
  # portable SFX wrapper — it stays asInvoker, so the non-elevated wrapper can't
  # launch the elevated inner exe and the app never starts (electron-builder
  # #3156/#3738/#7566). The portable target has its OWN knob; set admin so the
  # wrapper elevates up-front and runs the app in the same elevated context.
  requestExecutionLevel: admin

publish:
  provider: github
  owner: dmtrbtc
  repo: SlaveAppsVPN
  releaseType: prerelease
  # Code signing will be added when EV certificate is obtained:
  # CSC_LINK and CSC_KEY_PASSWORD via CI environment variables

# Staged rollout support via GitHub Releases channels
# stable channel: publish provider targets stable releases
# beta channel: publish provider targets pre-releases
